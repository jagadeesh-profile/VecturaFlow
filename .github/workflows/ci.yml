name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    env:
      # Dummy creds — the lazy-client refactor means imports never call out
      OPENAI_API_KEY: sk-test-ci
      PINECONE_API_KEY: pc-test-ci
      PINECONE_INDEX: vecturaflow-ci
      INGESTION_BUCKET: vecturaflow-ci
      INGESTION_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/000000000000/ci-ingest
      EMBEDDING_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/000000000000/ci-embed
      REGISTRY_TABLE: vecturaflow-ci-registry
      KEYS_TABLE: vecturaflow-ci-keys
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      COVERAGE_FILE: /tmp/.coverage

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system ruff pytest pytest-cov

      - name: Ruff
        run: ruff check api/ ingestion/ embeddings/

      - name: Pytest with coverage
        run: pytest tests/ --cov=api --cov=ingestion --cov=embeddings --cov-report=xml --cov-fail-under=70

      - uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Build + scan container
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: vecturaflow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: vecturaflow:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
