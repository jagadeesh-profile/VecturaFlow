name: Deploy

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write   # OIDC federation with AWS

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: vecturaflow-prod-api
  ECS_CLUSTER: vecturaflow-prod-cluster
  ECS_SERVICE: vecturaflow-prod-api
  ECS_TASK_FAMILY: vecturaflow-prod-api

jobs:
  push-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS creds (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$TAG"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Render new task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: ${{ env.ECS_TASK_FAMILY }}
          container-name: api
          image: ${{ env.IMAGE }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Smoke test deployed API
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "${{ secrets.API_HEALTH_URL }}" > /dev/null; then
              echo "healthy"
              exit 0
            fi
            sleep 5
          done
          echo "API did not become healthy"
          exit 1
