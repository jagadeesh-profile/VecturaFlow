# ─────────────────────────────────────────────────────────────────────────────
# VecturaFlow — local development stack.
#
# Spins up:
#   - api          (FastAPI container built from ./Dockerfile)
#   - redis        (retriever cache)
#   - localstack   (emulates S3 + SQS + DynamoDB + CloudWatch)
#   - setup        (one-shot: provisions buckets/queues/tables on localstack)
#
# Usage:
#   docker compose up --build
#   curl http://localhost:8000/health
#   curl -X POST http://localhost:8000/v1/chat/completions \
#        -H "Authorization: Bearer dev" \
#        -H "Content-Type: application/json" \
#        -d '{"messages":[{"role":"user","content":"ping"}]}'
#
# Notes:
#   - Put real OPENAI_API_KEY / PINECONE_API_KEY in .env before `up`.
#   - All AWS clients point at localstack via the AWS_ENDPOINT_URL env var.
# ─────────────────────────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3.6
    restart: unless-stopped
    environment:
      SERVICES: s3,sqs,dynamodb,cloudwatch,logs
      DEBUG: "0"
      AWS_DEFAULT_REGION: us-east-1
      PERSISTENCE: "1"
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 15

  setup:
    image: amazon/aws-cli:2.15.0
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      sh -c "
        aws --endpoint-url=http://localstack:4566 s3api create-bucket --bucket vecturaflow-ingestion || true;
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name vecturaflow-ingestion || true;
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name vecturaflow-embedding || true;
        aws --endpoint-url=http://localstack:4566 dynamodb create-table
          --table-name vecturaflow-registry
          --attribute-definitions AttributeName=doc_id,AttributeType=S
          --key-schema AttributeName=doc_id,KeyType=HASH
          --billing-mode PAY_PER_REQUEST || true;
        aws --endpoint-url=http://localstack:4566 dynamodb create-table
          --table-name vecturaflow-keys
          --attribute-definitions AttributeName=api_key_hash,AttributeType=S
          --key-schema AttributeName=api_key_hash,KeyType=HASH
          --billing-mode PAY_PER_REQUEST || true;
        echo 'localstack provisioned';
      "
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      API_ENV: development
      API_DEBUG: "true"
      API_DEV_BYPASS: "true"
      UVICORN_WORKERS: "1"
      # LLM + vector DB (real services — supply in .env)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-missing}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-pc-missing}
      PINECONE_INDEX: ${PINECONE_INDEX:-vecturaflow}
      PINECONE_REGION: ${PINECONE_REGION:-us-east-1}
      # AWS — point everything at localstack
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      INGESTION_BUCKET: vecturaflow-ingestion
      INGESTION_QUEUE_URL: http://localstack:4566/000000000000/vecturaflow-ingestion
      EMBEDDING_QUEUE_URL: http://localstack:4566/000000000000/vecturaflow-embedding
      REGISTRY_TABLE: vecturaflow-registry
      KEYS_TABLE: vecturaflow-keys
      # Cache
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  localstack-data:
